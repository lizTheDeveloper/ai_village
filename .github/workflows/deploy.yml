name: Deploy MVEE

on:
  push:
    branches: [main]
    paths:
      - 'custom_game_engine/**'
  workflow_dispatch:
    inputs:
      paperclip_issue:
        description: 'Paperclip issue ID (e.g. MUL-1847)'
        required: false
        type: string

concurrency:
  group: hetzner-mvee
  cancel-in-progress: true

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: custom_game_engine
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: custom_game_engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Stub external file deps (folkfork-bridge lives outside this repo)
        run: |
          PKG=node_modules/@multiverse-studios/folkfork-bridge
          rm -rf "$PKG"
          mkdir -p "$PKG"
          cp packages/core/src/typings/folkfork-bridge.d.ts "$PKG/index.d.ts"
          echo '{"name":"@multiverse-studios/folkfork-bridge","version":"0.0.0","types":"index.d.ts","main":"index.js"}' > "$PKG/package.json"
          echo 'module.exports = {};' > "$PKG/index.js"

      - name: Type check
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Production build
        run: npm run build:prod

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mvee-dist
          path: |
            custom_game_engine/demo/dist/
            custom_game_engine/demo/server/
            custom_game_engine/package.json
            custom_game_engine/package-lock.json
            custom_game_engine/Dockerfile.prebuilt
            custom_game_engine/docker-compose.prod.yml
          retention-days: 7

  deploy:
    name: Deploy to Hetzner
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: mvee-dist
          path: artifacts

      - name: Sync build artifacts to Hetzner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "artifacts/demo/dist,artifacts/demo/server,artifacts/Dockerfile.prebuilt,artifacts/docker-compose.prod.yml,artifacts/package.json,artifacts/package-lock.json"
          target: /opt/mvee/_staging/
          strip_components: 1
          overwrite: true

      - name: Run server-side deploy script
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            # Move staged artifacts into place and deploy
            cp -a /opt/mvee/_staging/demo/dist/* /opt/mvee/demo/dist/ 2>/dev/null || true
            cp -a /opt/mvee/_staging/demo/server/* /opt/mvee/demo/server/ 2>/dev/null || true
            cp -f /opt/mvee/_staging/Dockerfile.prebuilt /opt/mvee/ 2>/dev/null || true
            cp -f /opt/mvee/_staging/docker-compose.prod.yml /opt/mvee/ 2>/dev/null || true
            cp -f /opt/mvee/_staging/package.json /opt/mvee/ 2>/dev/null || true
            cp -f /opt/mvee/_staging/package-lock.json /opt/mvee/ 2>/dev/null || true
            rm -rf /opt/mvee/_staging
            /opt/mvee/deploy.sh

  verify:
    name: Verify Production
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Canary - verify container serves directly
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            # Hit container directly, bypass Traefik/CDN
            for i in $(seq 1 10); do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:3000/mvee/)
              if [ "$STATUS" = "200" ]; then
                echo "Container serving directly: HTTP 200"
                # Verify JS bundle exists in response
                BODY=$(curl -s --max-time 10 http://localhost:3000/mvee/)
                if echo "$BODY" | grep -q '<script'; then
                  echo "HTML contains script tags — canary PASSED"
                  exit 0
                else
                  echo "WARNING: No script tags in response"
                fi
              fi
              echo "Attempt $i: HTTP $STATUS, retrying in 3s..."
              sleep 3
            done
            echo "ERROR: Container not serving after 30s"
            exit 1

      - name: Wait for container startup
        run: sleep 15

      - name: Verify MVEE returns HTTP 200
        id: mvee_check
        run: |
          URL="https://play.multiversestudios.xyz/mvee/"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 -L "$URL")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "MVEE at $URL → HTTP $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "::error::MVEE returned HTTP $STATUS"
            exit 1
          fi

      - name: Verify JS bundle loads
        run: |
          BASE_URL="https://play.multiversestudios.xyz/mvee"
          BODY=$(curl -s --max-time 30 -L "$BASE_URL/")

          # Extract the main JS bundle src from script tags
          BUNDLE=$(echo "$BODY" | grep -oP 'src="([^"]*\.js)"' | head -1 | sed 's/src="//;s/"//')
          if [ -z "$BUNDLE" ]; then
            echo "::error::No JS bundle found in HTML response"
            exit 1
          fi
          echo "Found bundle: $BUNDLE"

          # Resolve relative URLs
          case "$BUNDLE" in
            http*) BUNDLE_URL="$BUNDLE" ;;
            /*) BUNDLE_URL="https://play.multiversestudios.xyz${BUNDLE}" ;;
            *) BUNDLE_URL="${BASE_URL}/${BUNDLE}" ;;
          esac

          # Verify bundle returns 200 and has content
          BUNDLE_STATUS=$(curl -s -o /tmp/bundle.js -w '%{http_code}' --max-time 30 -L "$BUNDLE_URL")
          BUNDLE_SIZE=$(wc -c < /tmp/bundle.js)
          echo "Bundle at $BUNDLE_URL → HTTP $BUNDLE_STATUS, ${BUNDLE_SIZE} bytes"

          if [ "$BUNDLE_STATUS" -ne 200 ]; then
            echo "::error::JS bundle returned HTTP $BUNDLE_STATUS"
            exit 1
          fi
          if [ "$BUNDLE_SIZE" -lt 1000 ]; then
            echo "::error::JS bundle suspiciously small (${BUNDLE_SIZE} bytes) — likely an error page"
            exit 1
          fi
          echo "Smoke test passed: HTML 200, bundle loads (${BUNDLE_SIZE} bytes)"

      - name: Browser smoke test (Playwright)
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const errors = [];
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            page.on('pageerror', e => errors.push(e.message));
            page.on('console', msg => {
              if (msg.type() === 'error' && !msg.text().includes('favicon') && !msg.text().includes('sentry'))
                errors.push(msg.text());
            });
            await page.goto('https://play.multiversestudios.xyz/mvee/', { waitUntil: 'domcontentloaded', timeout: 30000 });
            await page.waitForTimeout(8000);
            const hasGame = await page.locator('canvas, #game-container, [data-game]').count() > 0;
            await browser.close();
            if (errors.length) { console.error('JS errors:', errors); process.exit(1); }
            if (!hasGame) { console.error('No game elements found'); process.exit(1); }
            console.log('Browser smoke test PASSED: game loaded, no JS errors');
          })().catch(e => { console.error(e); process.exit(1); });
          "
        continue-on-error: false

  rollback:
    name: Rollback on Failure
    needs: verify
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Run server-side rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: /opt/mvee/deploy.sh rollback

  notify:
    name: Notify Paperclip
    needs: [ci, deploy, verify]
    runs-on: ubuntu-latest
    if: always()
    env:
      PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
      PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_CI_TOKEN }}
      PAPERCLIP_COMPANY_ID: ${{ secrets.PAPERCLIP_COMPANY_ID }}
    steps:
      - name: Report deploy result
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          CI_RESULT="${{ needs.ci.result }}"
          DEPLOY_RESULT="${{ needs.deploy.result }}"
          VERIFY_RESULT="${{ needs.verify.result }}"

          if [ "$CI_RESULT" != "success" ]; then
            TITLE="MVEE Deploy Blocked — Build/Tests Failed"
            BODY="CI gate failed (build or tests). Deploy did not proceed.\n\n- CI: ${CI_RESULT}\n- Commit: ${{ github.sha }}\n- Workflow: ${RUN_URL}"
          elif [ "$VERIFY_RESULT" = "success" ]; then
            TITLE="MVEE Deploy Succeeded"
            BODY="Deployed to play.multiversestudios.xyz/mvee/ and smoke tests passed.\n\n- CI: ${CI_RESULT}\n- Deploy: ${DEPLOY_RESULT}\n- Verify: ${VERIFY_RESULT}\n- Workflow: ${RUN_URL}"
          else
            TITLE="MVEE Deploy FAILED — Rollback Triggered"
            BODY="Post-deploy smoke test failed. Rollback was attempted.\n\n- CI: ${CI_RESULT}\n- Deploy: ${DEPLOY_RESULT}\n- Verify: ${VERIFY_RESULT}\n- Workflow: ${RUN_URL}"
          fi

          echo "### $TITLE"
          echo "$BODY"

          # Always create a Paperclip issue on failure (no manual input required)
          if [ -z "$PAPERCLIP_API_URL" ] || [ -z "$PAPERCLIP_API_KEY" ]; then
            echo "Paperclip not configured — skipping notification"
            exit 0
          fi

          if [ "$VERIFY_RESULT" != "success" ]; then
            # Auto-create a deploy-failure issue assigned to DevOps
            curl -s -X POST \
              -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
              -H "Content-Type: application/json" \
              "$PAPERCLIP_API_URL/api/companies/$PAPERCLIP_COMPANY_ID/issues" \
              -d "{
                \"title\": \"Deploy Alert: ${TITLE}\",
                \"description\": \"${BODY}\",
                \"status\": \"todo\",
                \"priority\": \"urgent\",
                \"labels\": [\"deploy-failure\"]
              }" || echo "Failed to create alert issue"
          fi

          # Also comment on the specific issue if provided
          ISSUE_ID="${{ inputs.paperclip_issue }}"
          if [ -n "$ISSUE_ID" ]; then
            ISSUE_DATA=$(curl -s -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
              "$PAPERCLIP_API_URL/api/companies/$PAPERCLIP_COMPANY_ID/issues?search=$ISSUE_ID" 2>/dev/null || true)
            ISSUE_UUID=$(echo "$ISSUE_DATA" | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read())
          for d in data:
              if d.get('identifier') == '$ISSUE_ID':
                  print(d['id'])
                  break
          " 2>/dev/null || true)

            if [ -n "$ISSUE_UUID" ]; then
              curl -s -X POST \
                -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
                -H "Content-Type: application/json" \
                "$PAPERCLIP_API_URL/api/issues/$ISSUE_UUID/comments" \
                -d "{\"body\": \"## ${TITLE}\n\n${BODY}\"}" || echo "Failed to post comment"
            fi
          fi
