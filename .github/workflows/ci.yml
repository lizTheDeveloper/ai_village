name: CI

on:
  push:
    branches: [main]
    paths:
      - 'custom_game_engine/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'custom_game_engine/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: custom_game_engine

jobs:
  typecheck:
    name: Type Check (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: custom_game_engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type check)
        run: npm run build

  test-report:
    name: Test Suite (report only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: custom_game_engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (non-blocking)
        continue-on-error: true
        run: |
          npm test 2>&1 | tee test-output.txt
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -5 test-output.txt | sed 's/\x1B\[[0-9;]*m//g' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Gate: only typecheck blocks merges. Tests report but don't block.
  # Promote test-report to required once test rot is cleaned up.
  ci-gate:
    name: CI Gate
    needs: [typecheck]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" ]]; then
            echo "::error::Type check failed - fix build errors before merging"
            exit 1
          fi
          echo "CI gate passed (typecheck green, tests reported separately)"
