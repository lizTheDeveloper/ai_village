name: CI

on:
  push:
    branches: [main]
    paths:
      - 'custom_game_engine/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'custom_game_engine/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: custom_game_engine

jobs:
  typecheck:
    name: Type Check (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: custom_game_engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type check)
        run: npm run build

  test-regression:
    name: Test Regression Check (required)
    runs-on: ubuntu-latest
    outputs:
      test_baseline: ${{ steps.regression.outputs.test_baseline }}
      test_current: ${{ steps.regression.outputs.test_current }}
      test_passed: ${{ steps.regression.outputs.test_passed }}
      test_failed: ${{ steps.regression.outputs.test_failed }}
      build_result: ${{ steps.regression.outputs.build_result }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: custom_game_engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check test regression
        id: regression
        run: bash scripts/ci-check-regression.sh

  ci-gate:
    name: CI Gate
    needs: [typecheck, test-regression]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" ]]; then
            echo "::error::Type check failed — fix build errors before merging"
            exit 1
          fi
          if [[ "${{ needs.test-regression.result }}" != "success" ]]; then
            echo "::error::Test regression detected — test count dropped >10% from baseline"
            exit 1
          fi
          echo "CI gate passed: typecheck green, test regression check green"

  notify-paperclip:
    name: Notify Paperclip
    needs: [typecheck, test-regression]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Post CI result to Paperclip issue
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_CI_TOKEN: ${{ secrets.PAPERCLIP_CI_TOKEN }}
          PAPERCLIP_COMPANY_ID: ${{ secrets.PAPERCLIP_COMPANY_ID }}
          TEST_BASELINE: ${{ needs.test-regression.outputs.test_baseline }}
          TEST_CURRENT: ${{ needs.test-regression.outputs.test_current }}
          TEST_PASSED: ${{ needs.test-regression.outputs.test_passed }}
          TEST_FAILED: ${{ needs.test-regression.outputs.test_failed }}
          CI_BUILD_STATUS: ${{ (needs.typecheck.result == 'success' && needs.test-regression.result == 'success') && 'success' || 'failure' }}
        working-directory: .
        run: bash custom_game_engine/scripts/ci-notify-paperclip.sh
