services:
  mvee:
    build:
      context: .
      dockerfile: Dockerfile.prebuilt
    container_name: mvee-game
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/mvee/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - CONTENT_DATABASE_URL=postgresql://folkfork:${FOLKFORK_DB_PASSWORD}@folkfork-db:5432/folkfork_lore_admin
    volumes:
      - mvee-data:/app/demo/multiverse-data
      - mvee-sprites:/app/demo/runtime-sprites
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.mvee.rule=Host(`play.multiversestudios.xyz`) && PathPrefix(`/mvee`)
      - traefik.http.routers.mvee.entrypoints=https
      - traefik.http.routers.mvee.tls.certresolver=letsencrypt
      - traefik.http.routers.mvee.middlewares=studio-auth-optional@file
      - traefik.http.routers.mvee.priority=300
      - traefik.http.routers.mvee-http.rule=Host(`play.multiversestudios.xyz`) && PathPrefix(`/mvee`)
      - traefik.http.routers.mvee-http.entrypoints=http
      - traefik.http.routers.mvee-http.middlewares=mvee-redirect
      - traefik.http.routers.mvee-http.priority=300
      - traefik.http.middlewares.mvee-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.mvee-redirect.redirectscheme.permanent=true
      - traefik.http.services.mvee.loadbalancer.server.port=3000

volumes:
  mvee-data:
  mvee-sprites:

networks:
  coolify:
    external: true
