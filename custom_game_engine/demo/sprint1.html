<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>MVEE Sprint 1 — Minimal Renderer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      overflow: hidden;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 0.5rem 1rem;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    h1 {
      font-size: 1rem;
      font-weight: 600;
    }

    .status {
      font-size: 0.8rem;
      color: #888;
    }

    .status.running {
      color: #4ade80;
    }

    .status.error {
      color: #f87171;
    }

    .controls {
      font-size: 0.75rem;
      color: #666;
      margin-left: auto;
    }

    main {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>MVEE Sprint 1</h1>
      <p class="status" id="status">Initializing...</p>
      <span class="controls">WASD / Arrow keys: pan &nbsp;|&nbsp; Scroll: zoom &nbsp;|&nbsp; Drag: pan</span>
    </header>
    <main>
      <canvas id="canvas"></canvas>
    </main>
  </div>

  <script type="module" src="./src/sprint1.ts"></script>
</body>
</html>
