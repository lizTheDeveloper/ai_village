<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Multiverse: The End of Eternity</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      overflow: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    @keyframes status-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status {
      font-size: 0.875rem;
      color: #888;
      animation: status-pulse 1.8s ease-in-out infinite;
    }

    .status.running {
      color: #4ade80;
      animation: none;
    }

    .status.ready {
      color: #60a5fa;
      animation: none;
    }

    main {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Multiverse: The End of Eternity</h1>
      <p class="status" id="status">Initializing...</p>
    </header>

    <main>
      <canvas id="canvas"></canvas>
    </main>
  </div>

  <script type="module" src="./src/main.ts"></script>
  <script defer src="https://analytics.multiversestudios.xyz/script.js" data-website-id="38d680a7-28d1-42fd-9fd5-a66702675b88"></script>
  <script src="/mvee/matrix-auth.js?v=2"></script>
  <script src="/mvee/play-gate.js?v=2"></script>
  <script src="/mvee/pwyc.js"></script>
  <script src="/mvee/support-prompt.js" data-support-game="mvee" data-support-delay="180"></script>
</body>
</html>
