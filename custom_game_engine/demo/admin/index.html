<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MVEE Lore Bible Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e1117;
      --bg-card: #161b22;
      --bg-hover: #1c2333;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    /* Auth gate overlay */
    #auth-gate {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 1000;
    }
    #auth-gate.hidden { display: none; }
    .auth-box {
      text-align: center;
      padding: 2rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-card);
      max-width: 400px;
    }
    .auth-box h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .auth-box p { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem; }
    .auth-box button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .auth-box button:hover { background: var(--accent-hover); }
    .auth-error { color: var(--red); margin-top: 1rem; font-size: 0.85rem; }

    /* Layout */
    .topbar {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar h1 { font-size: 1rem; font-weight: 600; }
    .topbar .back-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
    }
    .topbar .back-link:hover { text-decoration: underline; }
    .topbar .user-info { margin-left: auto; color: var(--text-muted); font-size: 0.8rem; }

    .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

    /* Species grid */
    .species-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }
    .species-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      display: block;
    }
    .species-card:hover {
      border-color: var(--accent);
      background: var(--bg-hover);
    }
    .species-card img {
      width: 64px; height: 64px;
      image-rendering: pixelated;
      margin-bottom: 0.5rem;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
    }
    .species-card .name { font-weight: 600; font-size: 0.9rem; }
    .species-card .common { color: var(--text-muted); font-size: 0.75rem; }
    .species-card .badges { display: flex; gap: 0.3rem; justify-content: center; margin-top: 0.4rem; flex-wrap: wrap; }
    .badge {
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      background: rgba(88,166,255,0.15);
      color: var(--accent);
    }
    .badge.sapient { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge.xgame { background: rgba(210,153,34,0.15); color: var(--orange); }
    .no-sprite {
      width: 64px; height: 64px;
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 0.7rem;
      margin-bottom: 0.5rem;
    }

    /* Search/filter */
    .toolbar {
      display: flex; gap: 1rem; margin-bottom: 1.5rem; align-items: center; flex-wrap: wrap;
    }
    .toolbar input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      font-size: 0.9rem;
      flex: 1;
      min-width: 200px;
    }
    .toolbar input:focus { outline: none; border-color: var(--accent); }
    .toolbar .count { color: var(--text-muted); font-size: 0.85rem; white-space: nowrap; }

    /* Species detail */
    .detail-header {
      display: flex; gap: 1.5rem; align-items: flex-start;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .detail-header img {
      width: 96px; height: 96px;
      image-rendering: pixelated;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    .detail-header .info h2 { font-size: 1.3rem; margin-bottom: 0.25rem; }
    .detail-header .info .common-name { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; }
    .detail-header .info .desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
    .detail-header .info .badges { display: flex; gap: 0.4rem; margin-bottom: 0.5rem; }

    /* Tabs */
    .tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
      overflow-x: auto;
    }
    .tab {
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      background: none;
      border-top: none; border-left: none; border-right: none;
      font-family: inherit;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      min-height: 200px;
    }
    .tab-placeholder {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem;
    }

    /* Loading */
    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem;
      font-size: 0.9rem;
    }

    /* Stats table */
    .stats-row {
      display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.5rem;
    }
    .stat-item { font-size: 0.8rem; color: var(--text-muted); }
    .stat-item strong { color: var(--text); }
  </style>
</head>
<body>
  <div id="auth-gate">
    <div class="auth-box">
      <h1>Lore Bible Admin</h1>
      <p>Sign in with your Matrix account to manage species, lore, and game data.</p>
      <button id="auth-login-btn">Sign in with Matrix</button>
      <div id="auth-error" class="auth-error" style="display:none"></div>
    </div>
  </div>
  <div id="app"></div>
  <script src="/mvee/matrix-auth.js?v=2"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
